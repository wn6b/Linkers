<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wano | وائل</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --neon-cyan: #00f5ff;
    --neon-pink: #ff00ff;
    --neon-green: #00ff88;
    --neon-orange: #ff6600;
    --neon-yellow: #ffff00;
    --bg-dark: #010208;
    --glass: rgba(255,255,255,0.03);
    --glass-border: rgba(255,255,255,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-dark);
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: none;
  }

  /* CUSTOM CURSOR */
  #cursor {
    position: fixed;
    width: 10px; height: 10px;
    background: var(--neon-cyan);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 15px var(--neon-cyan), 0 0 40px var(--neon-cyan);
    transition: width 0.2s, height 0.2s, background 0.2s;
  }
  #cursor-ring {
    position: fixed;
    width: 42px; height: 42px;
    border: 1.2px solid rgba(0,245,255,0.4);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: all 0.08s cubic-bezier(0.23, 1, 0.32, 1);
  }

  /* ADVANCED GRID BACKGROUND */
  .grid-bg {
    position: fixed;
    inset: -50px;
    background-image:
      linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: gridMove 15s linear infinite;
    z-index: 0;
    perspective: 1000px;
    transform: rotateX(5deg);
  }
  @keyframes gridMove {
    0% { transform: translateY(0) rotateX(5deg); }
    100% { transform: translateY(50px) rotateX(5deg); }
  }

  /* DEPTH OVERLAY - REALISM BOOST */
  .depth-overlay {
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(circle at 50% 50%, transparent 0%, rgba(1, 2, 8, 0.4) 100%),
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,245,255,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 100% 100%, rgba(255,0,255,0.08) 0%, transparent 60%);
    z-index: 0;
    pointer-events: none;
  }

  .particles {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0% { transform: translateY(110vh) scale(0); opacity: 0; }
    20% { opacity: 0.8; }
    80% { opacity: 0.4; }
    100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
  }

  .scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0,0,0,0.2) 1px, rgba(0,0,0,0.2) 2px);
    z-index: 2;
    pointer-events: none;
    opacity: 0.3;
  }

  .wrapper {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px 80px;
    perspective: 1200px;
  }

  .header {
    text-align: center;
    margin-bottom: 60px;
    animation: fadeSlideDown 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }
  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-60px) rotateX(-20deg); }
    to { opacity: 1; transform: translateY(0) rotateX(0); }
  }

  .avatar-wrapper {
    position: relative;
    width: 130px; height: 130px;
    margin: 0 auto 24px;
  }
  .avatar-ring {
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--neon-cyan), var(--neon-pink), var(--neon-green), var(--neon-cyan));
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), white calc(100% - 2px));
    animation: rotateSlow 3s linear infinite;
    filter: drop-shadow(0 0 8px var(--neon-cyan));
  }
  .avatar-ring2 {
    position: absolute;
    inset: -25px;
    border-radius: 50%;
    border: 1px dashed rgba(0,245,255,0.2);
    animation: rotateSlow 12s linear infinite reverse;
  }
  @keyframes rotateSlow { 100% { transform: rotate(360deg); } }

  .avatar-inner {
    width: 130px; height: 130px;
    border-radius: 50%;
    background: linear-gradient(135deg, #050515, #0a0a25);
    display: flex; align-items: center; justify-content: center;
    font-size: 52px;
    border: 1px solid rgba(0,245,255,0.3);
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 40px rgba(0,245,255,0.15), inset 0 0 20px rgba(0,0,0,0.8);
  }

  .name {
    font-size: clamp(2.2rem, 7vw, 3.5rem);
    font-weight: 900;
    letter-spacing: -1px;
    background: linear-gradient(to bottom, #fff 30%, var(--neon-cyan) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 25px rgba(0,245,255,0.5));
  }

  .tagline {
    margin-top: 12px;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 5px;
    text-transform: uppercase;
    font-weight: 300;
  }

  .stats-bar {
    display: flex;
    gap: 35px;
    margin-top: 30px;
    justify-content: center;
  }
  .stat-num {
    font-size: 1.5rem;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 10px var(--neon-cyan);
  }
  .stat-label {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 2px;
  }

  .platforms-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 25px;
    width: 100%;
    max-width: 750px;
  }

  .platform-card {
    position: relative;
    background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
    border: 1px solid var(--glass-border);
    border-radius: 28px;
    padding: 30px 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    text-decoration: none;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    transform-style: preserve-3d;
    backdrop-filter: blur(10px);
  }

  .platform-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at var(--x) var(--y), rgba(255,255,255,0.1), transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .platform-card:hover::before { opacity: 1; }

  .platform-icon {
    width: 60px; height: 60px;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    transform: translateZ(30px);
  }
  .platform-card:hover .platform-icon { transform: translateZ(50px) scale(1.1); }

  .platform-label {
    font-size: 0.75rem;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.4);
    font-weight: 800;
    transform: translateZ(20px);
  }

  .glow-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--c);
    box-shadow: 0 0 15px var(--c);
    position: absolute;
    bottom: 15px; right: 15px;
    opacity: 0.5;
  }

  .bottom-brand {
    margin-top: 80px;
    text-align: center;
    opacity: 0.6;
  }
  .brand-text {
    font-size: 0.75rem;
    color: #fff;
    letter-spacing: 5px;
  }
  .brand-line {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
    margin: 15px auto;
  }

  @media (max-width: 500px) {
    .platforms-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
    .name { font-size: 2.2rem; }
  }
</style>

<script>
// CURSOR ENGINE
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx = 0, my = 0, rx = 0, ry = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top = my + 'px';
});

function animRing() {
  rx += (mx - rx) * 0.15;
  ry += (my - ry) * 0.15;
  ring.style.left = rx + 'px';
  ring.style.top = ry + 'px';
  requestAnimationFrame(animRing);
}
animRing();

// PARTICLES ENGINE
const pContainer = document.getElementById('particles');
const colors = ['#00f5ff','#ff00ff','#00ff88','#ffff00'];
for (let i = 0; i < 40; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = Math.random() * 3 + 1;
  p.style.cssText = `
    width: ${size}px; height: ${size}px;
    left: ${Math.random() * 100}%;
    background: ${colors[Math.floor(Math.random() * colors.length)]};
    animation-duration: ${10 + Math.random() * 10}s;
    animation-delay: ${-Math.random() * 20}s;
    box-shadow: 0 0 ${size*4}px currentColor;
  `;
  pContainer.appendChild(p);
}

// 90% REALISM 3D TILT
document.querySelectorAll('.platform-card').forEach(card => {
  card.addEventListener('mousemove', e => {
    const rect = card.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    card.style.setProperty('--x', (x * 100) + '%');
    card.style.setProperty('--y', (y * 100) + '%');
    
    const rotX = (y - 0.5) * -20;
    const rotY = (x - 0.5) * 20;
    card.style.transform = `perspective(1000px) rotateX(${rotX}deg) rotateY(${rotY}deg) translateY(-10px) scale(1.05)`;
  });
  
  card.addEventListener('mouseleave', () => {
    card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) translateY(0) scale(1)';
  });
});

function addRipple(e, el) {
  const r = document.createElement('div');
  r.className = 'ripple';
  const rect = el.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height) * 2.5;
  r.style.width = r.style.height = size + 'px';
  r.style.left = (e.clientX - rect.left - size/2) + 'px';
  r.style.top = (e.clientY - rect.top - size/2) + 'px';
  el.appendChild(r);
  setTimeout(() => r.remove(), 600);
}
</script>
</body>
